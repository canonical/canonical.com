# Extra, hand-curated link sections appended to /llms.txt and /llms-full.txt.
#
# The page lists in those files are generated automatically from the site's
# templates, so new pages show up on their own — you do NOT need to list them
# here. Use this file only to ADD curated links the templates can't produce,
# e.g. external documentation, community resources, or anything else you want
# LLMs to know about.
#
# Format:
#
#   extra:
#     - heading: Section title
#       links:
#         - title: Link text
#           url: https://example.com/page
#           description: Optional one-line summary.   # may be omitted
#
# Links with no title or no url are skipped; a section with no valid links is
# skipped. Editing this file and merging to main regenerates both files on the
# next deploy.

# Example
extra:
  - heading: Documentation
    links:
      - title: Juju
        url: https://canonical.com/juju/docs/juju-cli/page
        description: Official Ubuntu Server documentation.
